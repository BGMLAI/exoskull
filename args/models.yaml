# =============================================================================
# AI Models Configuration - ExoSkull GOTCHA Framework
# =============================================================================
# Multi-model routing configuration for cost optimization.
# Gemini 3.1 Pro migration (2026-02): Anthropic → BYOK only.
# Tier 1 = cheapest, Tier 4 = most capable.
# =============================================================================

# Default routing behavior
defaults:
  temperature: 0.7
  max_tokens: 1024
  enable_streaming: true
  enable_usage_tracking: true
  log_level: info # debug in development

# =============================================================================
# MODEL TIERS
# =============================================================================

tiers:
  # ---------------------------------------------------------------------------
  # TIER 0: Self-hosted ($0/token, fixed monthly GPU rental)
  # ---------------------------------------------------------------------------
  tier_0:
    name: "Self-hosted Tier"
    description: "Zero-cost inference for simple tasks"
    models:
      - id: selfhosted-qwen3-30b
        provider: selfhosted
        display_name: "Qwen3 30B (self-hosted)"
        pricing:
          input_per_1m: 0
          output_per_1m: 0
        limits:
          max_tokens: 8192
          context_window: 32000
        features:
          tools: true
          streaming: false

      - id: selfhosted-gemma-4b
        provider: selfhosted
        display_name: "Gemma 3 4B (self-hosted)"
        pricing:
          input_per_1m: 0
          output_per_1m: 0
        limits:
          max_tokens: 4096
          context_window: 32000
        features:
          tools: true
          streaming: false

  # ---------------------------------------------------------------------------
  # TIER 1: Ultra-cheap, ultra-fast
  # Use for: Simple routing, classification, greetings, data extraction
  # ---------------------------------------------------------------------------
  tier_1:
    name: "Flash Tier"
    description: "Ultra-cheap for trivial tasks"
    models:
      - id: gemini-3-flash
        provider: gemini
        display_name: "Gemini 3 Flash"
        pricing:
          input_per_1m: 0.50
          output_per_1m: 3.00
        limits:
          max_tokens: 8192
          context_window: 1000000
        features:
          tools: true
          streaming: true
          vision: true
          structured_output: true

      - id: gemini-2.5-flash
        provider: gemini
        display_name: "Gemini 2.5 Flash (legacy)"
        pricing:
          input_per_1m: 0.075
          output_per_1m: 0.30
        limits:
          max_tokens: 8192
          context_window: 1000000
        features:
          tools: true
          streaming: true

    task_categories:
      - classification
      - extraction
      - simple_response
      - routing
      - greetings

    keywords:
      - "wybierz"
      - "classify"
      - "categorize"
      - "route"
      - "yes/no"
      - "tak/nie"
      - "extract"
      - "parse"
      - "greeting"
      - "hello"
      - "cześć"
      - "hej"

  # ---------------------------------------------------------------------------
  # TIER 2: Analysis, reasoning (Gemini 3.1 Pro + Groq FREE)
  # ---------------------------------------------------------------------------
  tier_2:
    name: "Pro Tier"
    description: "Balanced cost/capability — Gemini 3.1 Pro primary"
    models:
      - id: gemini-3.1-pro
        provider: gemini
        display_name: "Gemini 3.1 Pro"
        pricing:
          input_per_1m: 2.00
          output_per_1m: 12.00
        limits:
          max_tokens: 65536
          context_window: 1000000
        features:
          tools: true
          streaming: true
          vision: true
          structured_output: true

      - id: groq-llama-3.3-70b
        provider: groq
        display_name: "Llama 3.3 70B (Groq FREE)"
        pricing:
          input_per_1m: 0
          output_per_1m: 0
        limits:
          max_tokens: 8192
          context_window: 128000
        features:
          tools: true
          streaming: true
        rate_limits:
          rpm: 30
          tokens_per_min: 6000

    byok_fallback:
      - id: claude-3-5-haiku
        provider: anthropic
        display_name: "Claude 3.5 Haiku (BYOK)"
        pricing:
          input_per_1m: 0.80
          output_per_1m: 4.00

    task_categories:
      - summarization
      - analysis
      - pattern_detection
      - conversation
      - content_generation

  # ---------------------------------------------------------------------------
  # TIER 3: Code generation, deep reasoning
  # ---------------------------------------------------------------------------
  tier_3:
    name: "Code Tier"
    description: "Code gen + deep reasoning — Gemini 3.1 Pro + DeepSeek"
    models:
      - id: gemini-3.1-pro
        provider: gemini
        display_name: "Gemini 3.1 Pro"

      - id: deepseek-r1
        provider: deepseek
        display_name: "DeepSeek R1"
        pricing:
          input_per_1m: 0.55
          output_per_1m: 2.19
        limits:
          max_tokens: 16384
          context_window: 128000
        features:
          tools: true
          streaming: true

      - id: kimi-k2.5
        provider: kimi
        display_name: "Kimi K2.5"
        pricing:
          input_per_1m: 0.60
          output_per_1m: 2.50
        limits:
          max_tokens: 256000
          context_window: 256000
        features:
          tools: true
          streaming: true
          swarm: true

      - id: codex-5-2
        provider: codex
        display_name: "Codex 5.2"
        pricing:
          input_per_1m: 1.75
          output_per_1m: 14.00

    byok_fallback:
      - id: claude-sonnet-4-5
        provider: anthropic
        display_name: "Claude Sonnet 4.5 (BYOK)"

    task_categories:
      - reasoning
      - swarm
      - long_context
      - code_generation
      - visual_analysis

  # ---------------------------------------------------------------------------
  # TIER 4: Strategic / Crisis (DeepSeek R1 primary)
  # ---------------------------------------------------------------------------
  tier_4:
    name: "Strategic Tier"
    description: "Top-tier reasoning — DeepSeek R1 primary, Opus BYOK"
    models:
      - id: deepseek-r1
        provider: deepseek
        display_name: "DeepSeek R1"
        pricing:
          input_per_1m: 0.55
          output_per_1m: 2.19

      - id: gemini-3.1-pro
        provider: gemini
        display_name: "Gemini 3.1 Pro (fallback)"

    byok_fallback:
      - id: claude-opus-4-6
        provider: anthropic
        display_name: "Claude Opus 4.6 (BYOK)"
        pricing:
          input_per_1m: 5.00
          output_per_1m: 25.00

    task_categories:
      - meta_coordination
      - crisis
      - strategic_planning
      - intervention_design
      - architecture_decisions

    crisis_keywords:
      - "samobójcz"
      - "suicide"
      - "kryzys"
      - "crisis"
      - "przemoc"
      - "violence"
      - "panic"
      - "panika"
      - "emergency"
      - "nagły"
      - "help me"
      - "pomóż"
      - "chcę umrzeć"
      - "nie chcę żyć"

    meta_keywords:
      - "strategia"
      - "strategy"
      - "plan długoterminowy"
      - "long-term"
      - "architecture"
      - "architektura"
      - "system design"

# =============================================================================
# CIRCUIT BREAKER
# =============================================================================

circuit_breaker:
  failure_threshold: 3 # Open after 3 consecutive failures
  cooldown_ms: 300000 # 5 minutes cooldown
  half_open_max_attempts: 1 # Test requests in half-open state

# =============================================================================
# ROUTER BEHAVIOR
# =============================================================================

router:
  max_escalations: 3 # Max tier escalations before giving up
  retry_delays_ms: [1000, 2000, 5000] # Backoff delays
  fallback_tier: 2 # Default fallback if Tier 1 unavailable

# =============================================================================
# PROMPT CACHING
# =============================================================================

caching:
  enabled: true
  static_context_min_tokens: 1024 # Cache if static context > 1024 tokens
  cache_ttl_seconds: 3600 # 1 hour cache

  static_content:
    - system_prompt
    - user_profile
    - app_configs
    - pattern_history

  dynamic_content:
    - current_request
    - recent_conversations
    - real_time_data

# =============================================================================
# USAGE TRACKING
# =============================================================================

usage_tracking:
  enabled: true
  log_to_supabase: true
  table: exo_ai_usage
  fields:
    - tenant_id
    - model
    - tier
    - provider
    - task_category
    - input_tokens
    - output_tokens
    - estimated_cost
    - latency_ms
    - success
    - error_message
    - timestamp

# =============================================================================
# ENVIRONMENT VARIABLES REQUIRED
# =============================================================================
# GOOGLE_AI_API_KEY    - Gemini API (primary — handles Flash, Pro, 3.1 Pro)
# DEEPSEEK_API_KEY     - DeepSeek (R1 + V3)
# GROQ_API_KEY         - Groq (FREE Llama 3.3 70B)
# ANTHROPIC_API_KEY    - Anthropic (emergency fallback)
# KIMI_API_KEY         - Kimi K2.5 (optional, long context)
# OPENAI_API_KEY       - OpenAI (embeddings only)
#
# BYOK (per tenant): exo_tenant_settings.ai_api_keys (JSONB)
# =============================================================================
